<svg width="640" height="640" viewBox="0 0 640 640" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg7" x1="0" y1="0" x2="640" y2="640" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#05060c"/>
      <stop offset="100%" stop-color="#0b0a1a"/>
    </linearGradient>
    <linearGradient id="stroke7" x1="0" y1="0" x2="640" y2="640" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
    <radialGradient id="glow7p" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow7c" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="640" height="640" fill="url(#bg7)"/>
  <circle cx="510" cy="120" r="220" fill="url(#glow7p)"/>
  <circle cx="130" cy="540" r="240" fill="url(#glow7c)"/>

  <!-- background pixel/catalog grid -->
  <g opacity="0.14" fill="#A78BFA">
    <rect x="460" y="70" width="16" height="16" rx="3"/>
    <rect x="486" y="70" width="16" height="16" rx="3"/>
    <rect x="512" y="70" width="16" height="16" rx="3"/>
    <rect x="460" y="96" width="16" height="16" rx="3"/>
    <rect x="486" y="96" width="16" height="16" rx="3"/>
    <rect x="512" y="96" width="16" height="16" rx="3"/>
    <rect x="460" y="122" width="16" height="16" rx="3"/>
    <rect x="486" y="122" width="16" height="16" rx="3"/>
    <rect x="512" y="122" width="16" height="16" rx="3"/>
  </g>

  <!-- two-tower retrieval architecture -->
  <g>
    <rect x="170" y="230" width="44" height="170" rx="10" fill="none" stroke="url(#stroke7)" stroke-width="3"/>
    <rect x="426" y="230" width="44" height="170" rx="10" fill="none" stroke="url(#stroke7)" stroke-width="3"/>
    <line x1="192" y1="260" x2="192" y2="370" stroke="#A78BFA" stroke-width="1.5" opacity="0.4"/>
    <line x1="448" y1="260" x2="448" y2="370" stroke="#22D3EE" stroke-width="1.5" opacity="0.4"/>

    <line x1="214" y1="300" x2="310" y2="345" stroke="#22D3EE" stroke-width="2" opacity="0.75"/>
    <line x1="426" y1="300" x2="330" y2="345" stroke="#A78BFA" stroke-width="2" opacity="0.75"/>
    <circle cx="320" cy="345" r="12" fill="#22D3EE"/>
  </g>

  <!-- ranked leaderboard bars -->
  <g transform="translate(210,460)">
    <rect x="0" y="45" width="28" height="55" rx="5" fill="#8B5CF6" opacity="0.85"/>
    <rect x="38" y="25" width="28" height="75" rx="5" fill="#A78BFA" opacity="0.9"/>
    <rect x="76" y="0" width="28" height="100" rx="5" fill="url(#stroke7)"/>
    <rect x="114" y="30" width="28" height="70" rx="5" fill="#A78BFA" opacity="0.9"/>
    <rect x="152" y="55" width="28" height="45" rx="5" fill="#8B5CF6" opacity="0.85"/>
    <!-- star marker over top pick -->
    <path d="M90 -18 l4.5 9.2 10.1 1.5 -7.3 7.1 1.7 10 -9-4.8 -9 4.8 1.7-10 -7.3-7.1 10.1-1.5z" fill="#22D3EE"/>
  </g>

  <text x="320" y="600" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="22" letter-spacing="4" fill="#A78BFA" opacity="0.65">PIXELPICKS</text>
</svg>
